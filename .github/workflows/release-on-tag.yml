name: Release On Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\StarPakExplorer.sln

      - name: Publish self-contained app
        run: >-
          dotnet publish .\StarPakExplorer.UI\StarPakExplorer.UI.csproj
          -c Release
          -r win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o .\artifacts\publish\win-x64

      - name: Pack release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipPath = ".\artifacts\release\StarPakExplorer-$tag-win-x64.zip"
          New-Item -ItemType Directory -Force .\artifacts\release | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path .\artifacts\publish\win-x64\* -DestinationPath $zipPath

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: .\artifacts\release\StarPakExplorer-${{ github.ref_name }}-win-x64.zip
          overwrite_files: true